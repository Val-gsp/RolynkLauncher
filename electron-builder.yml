appId: 'rolynklauncher'
productName: 'Rolynk Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2018-2026 Daniel Scalzi'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'
  # Requis pour que macOS autorise le micro au jeu (Simple Voice Chat) :
  # le jeu est un processus enfant du launcher, la permission s'applique au launcher.
  extendInfo:
    NSMicrophoneUsageDescription: 'Le chat vocal du serveur nécessite l''accès au microphone.'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'Val-gsp'
  vendor: 'Val-gsp'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'